<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muon — Page Not Found</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;

            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 24px;

        .container { max-width: 480px; }
        .logo {
            width: 80px;
            height: 80px;
            background: #000;
            color: #00D4FF;
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        h1 { font-size: 64px; margin: 0 0 8px; color: #00D4FF; }
        h2 { font-size: 22px; margin: 0 0 12px; }
        p { color: #86868b; margin-bottom: 24px; }
        a {
            display: inline-block;
            background: #00D4FF;
            color: #000;
            padding: 12px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 600;
        }

<body>
    <div class="container">
        <div class="logo">μ</div>
        <h1>404</h1>
        <h2>Page not found</h2>

        <a href="/muon/">← Back to Muon</a>
