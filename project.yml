name: Muon
options:
  bundleIdPrefix: com.weaveon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
    INFOPLIST_FILE: Muon/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    CODE_SIGN_STYLE: Automatic

targets:
  Muon:
    type: application
    platform: iOS
    sources:
      - path: Muon
        excludes:
          - "Resources/Products.storekit"
    resources:
      - path: Muon/Resources/Sounds
        buildPhase: resources
      - path: Muon/Resources/MuonProducts.storekit
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.weaveon.muon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
    info:
      path: Muon/Info.plist
      properties:
        UIBackgroundModes:
          - audio
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchBackgroundColor
          UIImageName: LaunchIcon
